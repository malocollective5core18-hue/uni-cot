<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at top, #10324a, #07131d 58%);
            color: #f4f1ea;
            display: grid;
            place-items: center;
        }
        .login-card {
            width: min(440px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 24px;
            background: rgba(11, 23, 34, 0.92);
            border: 1px solid rgba(244, 241, 234, 0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }
        p {
            margin: 0 0 24px;
            color: rgba(244, 241, 234, 0.78);
        }
        label {
            display: block;
            margin: 14px 0 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(244, 241, 234, 0.16);
            background: rgba(255, 255, 255, 0.06);
            color: inherit;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 14px 16px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #d9a441, #f3d18c);
            color: #10202c;
            font-weight: 700;
            cursor: pointer;
        }
        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 16px;
        }
        .messages li {
            margin-bottom: 10px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>Founder Login</h1>
        <p>Use your founder email and password to manage owner access, subscriptions, and domain assignment.</p>
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        <form method="post" action="{% url 'founder_login' %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="founder_login">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" autocomplete="username" required>
            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="current-password" required>
            <button type="submit">Enter Founder Control</button>
        </form>
    </main>
</body>
</html>
