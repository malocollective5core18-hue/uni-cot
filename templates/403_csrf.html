<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check Failed</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #121a31;
    --text: #edf2ff;
    --muted: #9aa7c7;
    --accent: #5b8cff;
    --warning: #ff7b7b;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      radial-gradient(circle at top, rgba(91, 140, 255, 0.16), transparent 35%),
      linear-gradient(160deg, #08101f 0%, var(--bg) 55%, #060a14 100%);
    color: var(--text);
    font-family: Arial, sans-serif;
  }

  .panel {
    width: min(100%, 560px);
    background: rgba(18, 26, 49, 0.92);
    border: 1px solid rgba(91, 140, 255, 0.22);
    border-radius: 18px;
    padding: 28px 24px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
  }

  h1 {
    margin: 0 0 12px;
    font-size: 1.7rem;
  }

  p {
    margin: 0 0 14px;
    line-height: 1.6;
    color: var(--muted);
  }

  .reason {
    margin: 18px 0;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(255, 123, 123, 0.08);
    border: 1px solid rgba(255, 123, 123, 0.22);
    color: var(--warning);
    word-break: break-word;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 22px;
  }

  a,
  button {
    appearance: none;
    border: none;
    border-radius: 999px;
    padding: 11px 16px;
    font-size: 0.95rem;
    cursor: pointer;
    text-decoration: none;
  }

  .primary {
    background: var(--accent);
    color: white;
  }

  .secondary {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
</style>
</head>
<body>
  <div class="panel">
    <h1>Security check failed</h1>
    <p>Your form submission could not be verified, so Django blocked it for safety.</p>
    <p>This usually happens when the page stayed open too long, the CSRF cookie changed, or the browser submitted an old form.</p>
    {% if reason %}
      <div class="reason">{{ reason }}</div>
    {% endif %}
    <div class="actions">
      <button class="primary" type="button" onclick="window.location.reload()">Refresh and try again</button>
      <a class="secondary" href="javascript:history.back()">Go back</a>
    </div>
  </div>
</body>
</html>
